version: '3.9'

services:
  db:
    container_name: store_backend_db
    image: postgres:15
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared_network

  backend:
    container_name: store_backend
    build: ./backend
    restart: always
    env_file: .env
    depends_on:
      - db
    networks:
      - shared_network
    volumes:
      - ./backend:/app
      - shop_static_volume:/app/staticfiles
      - shop_media_volume:/app/media
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py createsuperuser --noinput || true &&
        gunicorn backend.wsgi:application --bind 0.0.0.0:8000
      "

volumes:
  postgres_data:
  shop_static_volume:
    external: true
  shop_media_volume:
    external: true

networks:
  shared_network:
    external: true
